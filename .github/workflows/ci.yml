name: "Portfolio Pipeline"
on:
  push:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonando o repositório dentro da VM
        uses: actions/checkout@v4

      - name: Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Instalando as dependências
        run: npm ci

      - name: Rodando a checagem de tipagem (tsc)
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Rodando testes unitários
        run: npm run test -- --watch=false --browsers=ChromeHeadless