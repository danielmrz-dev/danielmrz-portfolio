<section class="technologies">

  <div class="divider"></div>

  <ul class="technologies__list">
    @for (technology of technologiesList; track technology) {
      <li class="technologies__list-item">
        <h3 class="technologies__item-title">{{ technology.technology }}</h3>
        <p class="technologies__item-description">{{ getTexts(translationsService.language(), technology.xpYears) }}</p>
      </li>
    }
  </ul>

  <div class="divider"></div>

</section>
